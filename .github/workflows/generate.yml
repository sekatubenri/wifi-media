name: Auto Generate Article

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Anthropic SDK
        run: npm install
        working-directory: generator

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generator/generate.js

      - name: Commit new article
        run: |
          git config user.name "auto-article-bot"
          git config user.email "bot@example.com"
          git add content/ unused-topics.json
          git diff --staged --quiet || git commit -m "Auto-generate: $(date +%Y-%m-%d)"
          git push
